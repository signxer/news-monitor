{% extends "base.html" %}

{% block title %}首页 - 新闻监控系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-4 mb-4">
    <div class="fade-in">
        <h1 class="h2 mb-1"><i class="bi bi-newspaper text-primary"></i> 新闻监控系统</h1>
        <p class="text-muted mb-0">实时监控新闻动态</p>
    </div>
    <div class="btn-toolbar mb-2 mb-md-0">
        <div class="btn-group me-2">
            <button type="button" class="btn btn-primary" onclick="checkNow()">
                <i class="bi bi-arrow-clockwise"></i> 立即检查
            </button>
            <button type="button" class="btn btn-outline-secondary" onclick="refreshNews()">
                <i class="bi bi-arrow-repeat"></i> 刷新
            </button>
        </div>
    </div>
</div>

<!-- 统计信息 -->
<div class="row mb-4">
    <div class="col-md-3 mb-3">
        <div class="card text-center h-100 fade-in" style="animation-delay: 0.1s">
            <div class="card-body d-flex flex-column justify-content-center">
                <div class="mb-3">
                    <i class="bi bi-collection text-primary" style="font-size: 2.5rem;"></i>
                </div>
                <h5 class="card-title text-primary mb-2">总新闻数</h5>
                <h2 id="total-news" class="card-text fw-bold">-</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-center h-100 fade-in" style="animation-delay: 0.2s">
            <div class="card-body d-flex flex-column justify-content-center">
                <div class="mb-3">
                    <i class="bi bi-plus-circle text-success" style="font-size: 2.5rem;"></i>
                </div>
                <h5 class="card-title text-success mb-2">今日新增</h5>
                <h2 id="today-news" class="card-text fw-bold">-</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-center h-100 fade-in" style="animation-delay: 0.3s">
            <div class="card-body d-flex flex-column justify-content-center">
                <div class="mb-3">
                    <i class="bi bi-globe text-info" style="font-size: 2.5rem;"></i>
                </div>
                <h5 class="card-title text-info mb-2">监控网站</h5>
                <h2 id="active-sites" class="card-text fw-bold">-</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card text-center h-100 fade-in" style="animation-delay: 0.4s">
            <div class="card-body d-flex flex-column justify-content-center">
                <div class="mb-3">
                    <i class="bi bi-clock text-warning" style="font-size: 2.5rem;"></i>
                </div>
                <h5 class="card-title text-warning mb-2">最后检查</h5>
                <h2 id="last-check" class="card-text fw-bold">-</h2>
            </div>
        </div>
    </div>
</div>

<!-- 下一次采集倒计时 -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card text-center fade-in" style="animation-delay: 0.5s">
            <div class="card-body">
                <div class="mb-3">
                    <i class="bi bi-stopwatch text-info" style="font-size: 2.5rem;"></i>
                </div>
                <h5 class="card-title text-info mb-2">下一次采集倒计时</h5>
                <h2 id="countdown-timer" class="card-text fw-bold text-info">--:--:--</h2>
                <p class="text-muted mb-0">检查间隔: <span id="check-interval-display">-</span> 分钟</p>
            </div>
        </div>
    </div>
</div>

<!-- 新闻列表 -->
<div class="card fade-in" style="animation-delay: 0.6s">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="bi bi-list-ul text-primary"></i> 最新新闻
            </h5>
            <div class="d-flex align-items-center">
                <small class="text-muted me-2">自动刷新</small>
                <div class="spinner-border spinner-border-sm text-primary" role="status" id="refresh-spinner" style="display: none;">
                    <span class="visually-hidden">刷新中...</span>
                </div>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div id="news-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-3 text-muted">正在加载新闻数据...</p>
            </div>
        </div>
    </div>
</div>

<!-- 操作结果提示 -->
<div id="alert-container"></div>
{% endblock %}

{% block scripts %}
<script>
    let newsData = [];
    let countdownInterval = null;
    let nextCheckTime = null;
    let currentPage = 1;
    let currentPerPage = 20;

    // 显示提示信息
    function showAlert(message, type = 'info') {
        const alertContainer = document.getElementById('alert-container');
        const alertId = 'alert-' + Date.now();

        const alertHtml = `
            <div id="${alertId}" class="alert alert-${type} alert-dismissible fade show mt-3" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;

        alertContainer.insertAdjacentHTML('beforeend', alertHtml);

        // 3秒后自动消失
        setTimeout(() => {
            const alert = document.getElementById(alertId);
            if (alert) {
                alert.remove();
            }
        }, 3000);
    }

    // 立即检查新闻
    function checkNow() {
        showAlert('开始检查新闻更新...', 'info');

        fetch('/api/check_now')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert(data.message, 'success');
                    // 延迟刷新新闻列表（回到第1页）
                    setTimeout(() => loadPage(1), 2000);
                } else {
                    showAlert(data.message, 'danger');
                }
            })
            .catch(error => {
                showAlert('检查失败: ' + error.message, 'danger');
            });
    }

    // 加载指定页
    function loadPage(page) {
        currentPage = page;
        const container = document.getElementById('news-container');
        const refreshSpinner = document.getElementById('refresh-spinner');

        if (refreshSpinner) {
            refreshSpinner.style.display = 'block';
        }

        container.innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-3 text-muted">正在加载新闻数据...</p>
            </div>
        `;

        fetch(`/api/news?page=${currentPage}&per_page=${currentPerPage}`)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    throw new Error(data.error);
                }
                newsData = data.items || [];
                displayNews(data);
                updateStatistics(data);
            })
            .catch(error => {
                container.innerHTML = `
                    <div class="alert alert-danger fade-in" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i> 加载新闻失败: ${error.message}
                        <button class="btn btn-outline-danger btn-sm ms-2" onclick="loadPage(${currentPage})">重试</button>
                    </div>
                `;
            })
            .finally(() => {
                if (refreshSpinner) {
                    refreshSpinner.style.display = 'none';
                }
            });
    }

    // 刷新当前页
    function refreshNews() {
        loadPage(currentPage);
    }

    // 显示新闻列表 + 分页控件
    function displayNews(data) {
        const container = document.getElementById('news-container');
        const news = data.items || [];

        if (data.total === 0) {
            container.innerHTML = `
                <div class="text-center py-5 fade-in">
                    <div class="mb-4">
                        <i class="bi bi-inbox text-muted" style="font-size: 4rem;"></i>
                    </div>
                    <h5 class="text-muted mb-3">暂无新闻数据</h5>
                    <p class="text-muted mb-4">点击下方按钮开始检查新闻更新</p>
                    <button class="btn btn-primary btn-lg" onclick="checkNow()">
                        <i class="bi bi-arrow-clockwise"></i> 立即检查
                    </button>
                </div>
            `;
            return;
        }

        let html = '';

        // 新闻列表
        news.forEach((item, index) => {
            const dbDate = new Date(item.created_at);
            dbDate.setHours(dbDate.getHours() + 8);
            const date = dbDate.toLocaleString('zh-CN');
            const hasUrl = item.url && item.url.trim() !== '';
            const animationDelay = (index * 0.05).toFixed(2);

            html += `
                <div class="news-item fade-in" style="animation-delay: ${animationDelay}s">
                    <div class="d-flex align-items-start">
                        <div class="flex-shrink-0 me-3">
                            <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                                <i class="bi bi-newspaper text-white"></i>
                            </div>
                        </div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25">
                                    <i class="bi bi-globe2"></i> ${escapeHtml(item.site_name)}
                                </span>
                                <small class="text-muted">
                                    <i class="bi bi-clock"></i> ${date}
                                </small>
                            </div>
                            <h6 class="news-title mb-2">
                                ${hasUrl ? `<a href="${item.url}" target="_blank" class="text-decoration-none text-dark">` : ''}
                                ${escapeHtml(item.title)}
                                ${hasUrl ? `<i class="bi bi-box-arrow-up-right ms-1 text-primary"></i></a>` : ''}
                            </h6>
                            ${item.translated_title && item.translated_title !== item.title ?
                                `<p class="news-translated mb-2"><i class="bi bi-translate text-info"></i> ${escapeHtml(item.translated_title)}</p>` : ''}
                            <div class="news-meta">
                                <small class="text-muted">
                                    <i class="bi bi-calendar3"></i> 发布时间: ${item.date}
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        // 分页控件
        html += buildPagination(data);

        container.innerHTML = html;
    }

    // 构建分页控件
    function buildPagination(data) {
        const { page, pages, total, per_page } = data;
        if (pages <= 1) return '';

        let html = '<nav class="mt-4"><ul class="pagination justify-content-center mb-0">';

        // 上一页
        html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="event.preventDefault(); ${page > 1 ? 'loadPage(' + (page - 1) + ')' : ''}"><i class="bi bi-chevron-left"></i></a>
        </li>`;

        // 页码按钮（智能省略）
        const range = generatePageRange(page, pages);
        range.forEach(p => {
            if (p === '...') {
                html += '<li class="page-item disabled"><span class="page-link">…</span></li>';
            } else {
                html += `<li class="page-item ${p === page ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="event.preventDefault(); loadPage(${p})">${p}</a>
                </li>`;
            }
        });

        // 下一页
        html += `<li class="page-item ${page >= pages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="event.preventDefault(); ${page < pages ? 'loadPage(' + (page + 1) + ')' : ''}"><i class="bi bi-chevron-right"></i></a>
        </li>`;

        html += '</ul>';

        // 底部信息：总条数 + 每页条数选择
        html += `<div class="d-flex justify-content-center align-items-center mt-2 gap-3">
            <small class="text-muted">共 ${total} 条</small>
            <select class="form-select form-select-sm" style="width: auto;" onchange="changePerPage(this.value)">
                <option value="10" ${per_page === 10 ? 'selected' : ''}>10 条/页</option>
                <option value="20" ${per_page === 20 ? 'selected' : ''}>20 条/页</option>
                <option value="50" ${per_page === 50 ? 'selected' : ''}>50 条/页</option>
                <option value="100" ${per_page === 100 ? 'selected' : ''}>100 条/页</option>
            </select>
        </div>`;

        html += '</nav>';
        return html;
    }

    // 生成页码范围（智能省略）
    function generatePageRange(current, total) {
        if (total <= 7) {
            return Array.from({ length: total }, (_, i) => i + 1);
        }

        const range = [];
        range.push(1);

        if (current > 3) range.push('...');

        const start = Math.max(2, current - 1);
        const end = Math.min(total - 1, current + 1);
        for (let i = start; i <= end; i++) {
            range.push(i);
        }

        if (current < total - 2) range.push('...');

        range.push(total);
        return range;
    }

    // 切换每页条数
    function changePerPage(value) {
        currentPerPage = parseInt(value);
        currentPage = 1;
        loadPage(1);
    }

    // 更新统计信息
    function updateStatistics(data) {
        const totalNews = data.total;

        // 获取配置信息来计算活跃网站数
        fetch('/api/config')
            .then(response => response.json())
            .then(config => {
                const activeSites = config.news_sites.filter(site => site.enabled).length;
                document.getElementById('active-sites').textContent = activeSites;
            })
            .catch(() => {
                document.getElementById('active-sites').textContent = '-';
            });

        document.getElementById('total-news').textContent = totalNews;

        // 今日新增：从当前页的第一页数据中取最新时间作为"最后检查"
        // 今日新增需要额外请求，用一个小查询
        fetch('/api/news?page=1&per_page=1')
            .then(r => r.json())
            .then(d => {
                if (d.items && d.items.length > 0) {
                    const dbDate = new Date(d.items[0].created_at);
                    dbDate.setHours(dbDate.getHours() + 8);
                    document.getElementById('last-check').textContent = dbDate.toLocaleString('zh-CN');
                }
            })
            .catch(() => {});

        // 今日新增统计（从首页数据推算，或直接用总数近似显示）
        const today = new Date().toISOString().split('T')[0];
        const todayNews = (data.items || []).filter(item => {
            if (!item.created_at) return false;
            const dbDate = new Date(item.created_at);
            dbDate.setHours(dbDate.getHours() + 8);
            return dbDate.toISOString().split('T')[0] === today;
        }).length;
        // 如果当前页有今日新闻就显示，否则显示 "-"
        // 更准确的做法是后端单独返回，但这里保持简单
        document.getElementById('today-news').textContent = todayNews > 0 ? todayNews : (currentPage === 1 ? '0' : '-');
    }
    
    // HTML转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // 获取系统状态和倒计时信息
    function updateSystemStatus() {
        fetch('/api/status')
            .then(response => response.json())
            .then(data => {
                if (data.check_interval) {
                    document.getElementById('check-interval-display').textContent = data.check_interval;
                }
                
                if (data.next_check_time) {
                    nextCheckTime = new Date(data.next_check_time);
                    startCountdown();
                }
            })
            .catch(error => {
                console.error('获取系统状态失败:', error);
            });
    }
    
    // 开始倒计时
    function startCountdown() {
        if (countdownInterval) {
            clearInterval(countdownInterval);
        }
        
        countdownInterval = setInterval(function() {
            if (!nextCheckTime) return;
            
            const now = new Date();
            const timeDiff = nextCheckTime - now;
            
            if (timeDiff <= 0) {
                document.getElementById('countdown-timer').textContent = '00:00:00';
                // 倒计时结束，重新获取状态
                setTimeout(updateSystemStatus, 1000);
                return;
            }
            
            const hours = Math.floor(timeDiff / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);
            
            const timeString = String(hours).padStart(2, '0') + ':' + 
                             String(minutes).padStart(2, '0') + ':' + 
                             String(seconds).padStart(2, '0');
            
            document.getElementById('countdown-timer').textContent = timeString;
        }, 1000);
    }
    
    // 页面加载时获取新闻和系统状态
    document.addEventListener('DOMContentLoaded', function() {
        loadPage(1);
        updateSystemStatus();
    });

    // 每60秒自动刷新当前页
    setInterval(refreshNews, 60000);
    
    // 每5秒更新系统状态
    setInterval(updateSystemStatus, 5000);
</script>
{% endblock %}
