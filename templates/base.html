<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}新闻监控系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --success-color: #059669;
            --warning-color: #d97706;
            --danger-color: #dc2626;
            --info-color: #0891b2;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        body {
            background-color: var(--light-bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        .sidebar {
            min-height: 100vh;
            background-color: var(--white);
            border-right: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }
        
        .sidebar .nav-link {
            color: var(--text-secondary);
            padding: 12px 20px;
            margin: 4px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        
        .sidebar .nav-link:hover {
            background-color: var(--light-bg);
            color: var(--primary-color);
            transform: translateX(4px);
        }
        
        .sidebar .nav-link.active {
            background-color: var(--primary-color);
            color: var(--white);
            box-shadow: var(--shadow-md);
        }
        
        .sidebar .nav-link i {
            margin-right: 8px;
            font-size: 1.1em;
        }
        
        .sidebar h5 {
            color: var(--text-primary);
            font-weight: 700;
            padding: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .main-content {
            min-height: 100vh;
            background-color: var(--light-bg);
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            background-color: var(--white);
        }
        
        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .card-header {
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
            border-radius: 12px 12px 0 0 !important;
            padding: 20px;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .btn {
            border-radius: 8px;
            font-weight: 500;
            padding: 8px 16px;
            transition: all 0.2s ease;
            border: none;
            box-shadow: var(--shadow-sm);
        }
        
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-primary {
            background-color: var(--primary-color);
        }
        
        .btn-success {
            background-color: var(--success-color);
        }
        
        .btn-warning {
            background-color: var(--warning-color);
        }
        
        .btn-danger {
            background-color: var(--danger-color);
        }
        
        .btn-info {
            background-color: var(--info-color);
        }
        
        .log-container {
            background-color: #1a1a1a;
            color: #00ff41;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            max-height: 500px;
            overflow-y: auto;
            border-radius: 8px;
            padding: 16px;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.1);
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: var(--shadow-sm);
        }
        
        .status-running {
            background-color: var(--success-color);
            animation: pulse 2s infinite;
            box-shadow: 0 0 8px rgba(5, 150, 105, 0.4);
        }
        
        .status-stopped {
            background-color: var(--danger-color);
        }
        
        @keyframes pulse {
            0% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.7;
                transform: scale(1.1);
            }
            100% { 
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .news-item {
            border-left: 4px solid var(--primary-color);
            margin-bottom: 16px;
            padding: 16px;
            background-color: var(--white);
            border-radius: 0 8px 8px 0;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }
        
        .news-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }
        
        .news-title {
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .news-translated {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 8px;
        }
        
        .news-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        .badge {
            border-radius: 6px;
            font-weight: 500;
            padding: 4px 8px;
        }
        
        .alert {
            border: none;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }
        
        .spinner-border {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .status-section {
            background-color: var(--white);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            box-shadow: var(--shadow-sm);
        }
        
        .status-section h6 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .keyword-badge {
            cursor: default;
            transition: all 0.2s ease;
        }

        .keyword-badge:hover {
            opacity: 0.85;
        }

        .keyword-badge i:hover {
            color: #ff6b6b;
        }

        .site-card-header:hover {
            background-color: #f0f4ff;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <h5 class="text-center mb-4">
                        <i class="bi bi-newspaper"></i> 新闻监控
                    </h5>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
                                <i class="bi bi-house"></i> 首页
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'config_page' %}active{% endif %}" href="{{ url_for('config_page') }}">
                                <i class="bi bi-gear"></i> 配置
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'logs_page' %}active{% endif %}" href="{{ url_for('logs_page') }}">
                                <i class="bi bi-file-text"></i> 日志
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'sites_page' %}active{% endif %}" href="{{ url_for('sites_page') }}">
                                <i class="bi bi-activity"></i> 站点健康
                            </a>
                        </li>
                    </ul>
                    
                    <hr>
                    
                    <!-- 状态显示 -->
                    <div class="status-section">
                        <h6><i class="bi bi-activity"></i> 系统状态</h6>
                        <div class="mb-3">
                            <span id="status-indicator" class="status-indicator status-stopped"></span>
                            <span id="status-text" class="fw-medium">检查中...</span>
                        </div>
                        <div class="mb-2">
                            <div class="d-flex justify-content-between align-items-center">
                                <small class="text-muted"><i class="bi bi-browser-chrome"></i> ChromeDriver</small>
                                <span id="driver-status" class="badge bg-secondary">未知</span>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
            
            <!-- 主内容区 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="pt-3">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 更新系统状态
        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const indicator = document.getElementById('status-indicator');
                    const text = document.getElementById('status-text');
                    const driverStatus = document.getElementById('driver-status');
                    
                    if (data.is_running) {
                        indicator.className = 'status-indicator status-running';
                        text.textContent = '采集中';
                    } else {
                        indicator.className = 'status-indicator status-stopped';
                        text.textContent = '等待中';
                    }
                    
                    if (data.driver_available) {
                        driverStatus.className = 'badge bg-success';
                        driverStatus.textContent = '正常';
                    } else {
                        driverStatus.className = 'badge bg-danger';
                        driverStatus.textContent = '不可用';
                    }
                })
                .catch(error => {
                    console.error('获取状态失败:', error);
                });
        }
        
        // 页面加载时更新状态
        updateStatus();
        
        // 每5秒更新一次状态
        setInterval(updateStatus, 5000);
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
