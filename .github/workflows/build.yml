name: Build Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Build exe
        run: pyinstaller news_monitor.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/news_monitor.exe

  build-windows-x86:
    name: Windows x86 (Win7+)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'x86'

      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Build exe
        run: pyinstaller news_monitor.spec

      - name: Rename exe
        run: ren dist\news_monitor.exe news_monitor_x86.exe
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86
          path: dist/news_monitor_x86.exe

  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller news_monitor.spec

      - name: Package as deb
        run: |
          VER="${TAG#v}"
          PKGDIR="dist/news-monitor_${VER}_amd64"
          mkdir -p "$PKGDIR/DEBIAN" "$PKGDIR/usr/local/bin" "$PKGDIR/usr/lib/news-monitor"
          cp dist/news_monitor "$PKGDIR/usr/lib/news-monitor/"
          printf '#!/bin/sh\nexec /usr/lib/news-monitor/news_monitor "$@"\n' > "$PKGDIR/usr/local/bin/news-monitor"
          chmod +x "$PKGDIR/usr/local/bin/news-monitor"
          chmod +x "$PKGDIR/usr/lib/news-monitor/news_monitor"

          cat > "$PKGDIR/DEBIAN/control" << EOF
          Package: news-monitor
          Version: $VER
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libnss3, libatk-bridge2.0-0, libdrm2, libxdamage1, libgbm1, libgtk-3-0
          Maintainer: NewsMonitor <noreply@github.com>
          Description: News Monitor - RSS and web news monitoring tool
          EOF

          dpkg-deb --build "$PKGDIR" dist/
        env:
          TAG: ${{ github.ref_name || github.event.inputs.tag }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*.deb

  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build deb in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -e TAG="${{ github.ref_name || github.event.inputs.tag }}" \
            ubuntu:22.04 bash -c '
            set -e
            apt-get update
            apt-get install -y python3 python3-pip python3-venv gcc make dpkg-dev fakeroot
            pip3 install pyinstaller -r /workspace/requirements.txt
            cd /workspace
            pyinstaller news_monitor.spec

            VER="${TAG#v}"
            PKGDIR="/tmp/news-monitor_${VER}_arm64"
            mkdir -p "$PKGDIR/DEBIAN" "$PKGDIR/usr/local/bin" "$PKGDIR/usr/lib/news-monitor"
            cp dist/news_monitor "$PKGDIR/usr/lib/news-monitor/"
            printf "#!/bin/sh\nexec /usr/lib/news-monitor/news_monitor \"\$@\"\n" > "$PKGDIR/usr/local/bin/news-monitor"
            chmod +x "$PKGDIR/usr/local/bin/news-monitor"
            chmod +x "$PKGDIR/usr/lib/news-monitor/news_monitor"

            cat > "$PKGDIR/DEBIAN/control" << EOF
            Package: news-monitor
            Version: $VER
            Section: utils
            Priority: optional
            Architecture: arm64
            Depends: libnss3, libatk-bridge2.0-0, libdrm2, libgbm1
            Maintainer: NewsMonitor <noreply@github.com>
            Description: News Monitor - RSS and web news monitoring tool
            EOF

            dpkg-deb --build "$PKGDIR" /workspace/dist/
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: dist/*.deb

  build-macos-x64:
    name: macOS x64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: arch -x86_64 pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller (x64 via Rosetta)
        run: arch -x86_64 pyinstaller news_monitor.spec

      - name: Create DMG
        run: |
          mkdir -p dmg-root
          cp -r dist/news_monitor dmg-root/NewsMonitor
          hdiutil create -volname "NewsMonitor" \
            -srcfolder dmg-root \
            -ov -format UDZO \
            "dist/NewsMonitor-macOS-x64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: dist/NewsMonitor-macOS-x64.dmg

  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller news_monitor.spec

      - name: Create DMG
        run: |
          mkdir -p dmg-root
          cp -r dist/news_monitor dmg-root/NewsMonitor
          hdiutil create -volname "NewsMonitor" \
            -srcfolder dmg-root \
            -ov -format UDZO \
            "dist/NewsMonitor-macOS-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/NewsMonitor-macOS-arm64.dmg

  release:
    name: Create Release
    needs: [build-windows-x64, build-windows-x86, build-linux-x64, build-linux-arm64, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "Release ${{ github.ref_name || github.event.inputs.tag }}"
          draft: false
          prerelease: false
          files: |
            artifacts/windows-x64/*
            artifacts/windows-x86/*
            artifacts/linux-amd64/*
            artifacts/linux-arm64/*
            artifacts/macos-x64/*
            artifacts/macos-arm64/*
          body: |
            ## 新闻监控系统 ${{ github.ref_name || github.event.inputs.tag }}

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | Windows x64 | `news_monitor.exe` |
            | Windows x86 (Win7+) | `news_monitor_x86.exe` |
            | Linux x64 | `news-monitor_*_amd64.deb` |
            | Linux arm64 | `news-monitor_*_arm64.deb` |
            | macOS x64 (Intel) | `NewsMonitor-macOS-x64.dmg` |
            | macOS arm64 (Apple Silicon) | `NewsMonitor-macOS-arm64.dmg` |

            ### 安装说明
            - **Windows**: 直接运行 `news_monitor.exe`（64位系统）或 `news_monitor_x86.exe`（32位/Win7系统）
            - **Linux deb**: `sudo dpkg -i news-monitor_*.deb && news-monitor`
            - **macOS DMG**: 打开 DMG，将 NewsMonitor 拖到任意位置，双击运行
